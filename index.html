<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State of Hormuz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
    }

    /*
     * TO USE A REAL PHOTO:
     * Replace the entire .bg-image block below with:
     *   background: url('hormuz.jpg') center center / cover no-repeat;
     * and drop your image file next to this HTML file.
     */
    .bg-image {
      position: fixed;
      inset: 0;
      z-index: 0;

      /* Satellite-style: deep teal gulf water, tan/rust Arabian landmass */
      background:
        /* cloud wisps */
        radial-gradient(ellipse 30% 15% at 70% 20%, rgba(255,255,255,0.07) 0%, transparent 100%),
        radial-gradient(ellipse 20% 10% at 20% 75%, rgba(255,255,255,0.05) 0%, transparent 100%),
        /* Iran coastline landmass — upper band */
        linear-gradient(
          to bottom,
          #7a6040 0%,
          #8b6f45 8%,
          #6b5535 12%,
          #1c4a5e 20%,       /* where water begins */
          #1a5068 30%,
          #166070 45%,
          #0f5060 60%,
          #0c3d50 75%,
          #0a2e3d 85%,
          #08202c 100%
        );
      /* Oman peninsula hint */
      background-image:
        radial-gradient(ellipse 40% 20% at 85% 78%, #7a5a30 0%, transparent 55%),
        radial-gradient(ellipse 25% 12% at 12% 82%, #6b5535 0%, transparent 50%),
        radial-gradient(ellipse 30% 15% at 70% 20%, rgba(255,255,255,0.07) 0%, transparent 100%),
        radial-gradient(ellipse 20% 10% at 20% 75%, rgba(255,255,255,0.05) 0%, transparent 100%),
        linear-gradient(
          to bottom,
          #7a6040 0%,
          #8b6f45 8%,
          #6b5535 12%,
          #1c4a5e 20%,
          #1a5068 30%,
          #166070 45%,
          #0f5060 60%,
          #0c3d50 75%,
          #0a2e3d 85%,
          #08202c 100%
        );
    }

    /* Dark vignette so edges don't distract */
    .bg-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, rgba(0,0,0,0.65) 100%);
    }

    /* Semi-transparent overlay to ensure text contrast */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .ticker {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: #f0d080;
      text-transform: uppercase;
      border-top: 1px solid rgba(240, 208, 128, 0.6);
      border-bottom: 1px solid rgba(240, 208, 128, 0.6);
      padding: 0.4rem 2rem;
      text-shadow: 0 0 12px rgba(240, 208, 128, 0.5);
    }

    .question {
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }

    .subtitle {
      font-size: clamp(0.7rem, 1.8vw, 1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      margin-bottom: -0.5rem;
    }

    .answer {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: clamp(6rem, 22vw, 18rem);
      line-height: 0.88;
      /* Scanline pattern clipped to the text shape */
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 1)   0px,
        rgba(255, 255, 255, 1)   2px,
        rgba(180, 220, 255, 0.4) 2px,
        rgba(180, 220, 255, 0.4) 3px
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #ffffff; /* fallback */
      filter:
        drop-shadow(0 0 20px rgba(220, 50, 40, 0.9))
        drop-shadow(0 0 60px rgba(220, 50, 40, 0.5))
        drop-shadow(3px 3px 0px rgba(0,0,0,0.7));
      animation: flicker 6s infinite;
      letter-spacing: 0.03em;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.85; }
      97%            { opacity: 1; }
      98%            { opacity: 0.7; }
      99%            { opacity: 1; }
    }

    .coordinates {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.45);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .status-row {
      display: flex;
      gap: 2.5rem;
      margin-top: 0.5rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    .stat-value {
      font-size: 0.75rem;
      color: #e74c3c;
      text-shadow: 0 0 8px rgba(231,76,60,0.7), 0 1px 4px rgba(0,0,0,0.9);
    }

    .divider {
      width: 1px;
      height: 2.5rem;
      background: rgba(255,255,255,0.2);
      align-self: center;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      z-index: 3;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    .tip-btn {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.9rem;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(240, 208, 128, 0.4);
      border-radius: 2px;
      color: #f0d080;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .tip-btn:hover {
      background: rgba(240, 208, 128, 0.15);
      border-color: rgba(240, 208, 128, 0.8);
      color: #fff5cc;
    }

    .tip-btn svg {
      flex-shrink: 0;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="scanlines"></div>

  <div class="wrapper">
    <div class="ticker">Strait of Hormuz &mdash; Status Report</div>

<div class="subtitle">State of Hormuz</div>
<div class="answer">Not<br>Good</div>

    <div class="coordinates">26&deg; 34&prime; N &nbsp;/&nbsp; 56&deg; 15&prime; E &nbsp;&mdash;&nbsp; Persian Gulf Chokepoint</div>

    <div class="status-row">
      <div class="stat">
        <span class="stat-label">Threat Level</span>
        <span class="stat-value">Critical</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-label">Tanker Traffic</span>
        <span class="stat-value">Disrupted</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-label">Global Oil Supply</span>
        <span class="stat-value">At Risk</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-label">Naval Presence</span>
        <span class="stat-value">Elevated</span>
      </div>
    </div>
  </div>

  <footer>stateofhormuz.com &nbsp;&mdash;&nbsp; live assessment</footer>

  <a class="tip-btn" href="https://buymeacoffee.com/septerr" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="https://www.w3.org/2000/svg">
      <path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2V3zM4 19h16v2H4z"/>
    </svg>
    Buy me a coffee
  </a>

</body>
</html>
